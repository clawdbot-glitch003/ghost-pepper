[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  t-vk/ESP32 BLE Keyboard@^0.3.2
  bblanchon/ArduinoJson@^7.4.2
build_flags =
  -D BLE_DEVICE_NAME=\"GhostPepper-Keyboard\"
  -D BLE_DEVICE_MANUFACTURER=\"Ghost Pepper\"
  -D DEFAULT_CHAR_DELAY_MS=8

; LILYGO TTGO LoRa / Meshtastic boards use the original ESP32, so the
; generic esp32dev profile is usually sufficient for this USB-serial + BLE HID
; bridge. If your exact board definition is available in PlatformIO, switch
; `board = esp32dev` above to it (for example, a LoRa32 variant) without
; changing the firmware.
